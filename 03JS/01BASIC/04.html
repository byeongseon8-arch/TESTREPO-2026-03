<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        // number
        console.log(typeof 10);
        console.log(typeof 10.5);

        // string
        console.log(typeof "HELOO WOLRLD");
        console.log(typeof 'HELOO WOLRLD');
        console.log(typeof `HELOO WOLRLD`);
        console.log("--------------------");

        // object {key : value , key : value}
        console.log(typeof {})
        console.log({"name" : "홍길동" , "age" : "30", "addr" : "대구"});
        console.log("--------------------");


        // null : 변수 초기화(공간 형성 o + 기본값 삽입 - 개발자가 의도한 값)
        let vol = null;
        console.log(vol);
        console.log(typeof vol);

        //undefined(공간 형성x - 라벨링 o, 기본값 생략 - 개발자가 의도하지 못한 예외)
        let vol2;
        console.log(vol2);
        console.log(typeof vol2);
        console.log("--------------------");

        // boolean (true - 1 , false - 0)
        console.log(true)
        console.log(false)


    </script>


</body>
</html>
