<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        body{margin: 0; padding: 0;}

        .slier_block{
            width: 1200px;
            height: 300px;
            margin: 50px auto;

            display: flex;
            align-items: center;

            overflow: hidden;
        }
        .slier-block>.slier-wrapper{
            width: 3000px;
            height: 150px;
            border: 1px solid;

            display: flex;
            align-items: center;

            position: relative;

            animation-name: moving;
            animation-duration: 20s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }
        .slier-block>.slier-wrapper>.item{
            width: 200px;
            height: 150px;
            border: 1px solid;
            margin: 10px;
            background-color: white;
            transition: .4s;
        }
        
        .slier-block>.slier-wrapper:hover{
            animation-play-state: paused;
        }

        .slier-block>.slier-wrapper>.item:hover{
            transform: scale(1.5);
        }
            
        @keyframes moving {
            from{left:0;}
            to{left:-2300px}
        }


    </style>
</head>
<body>
    
    <div class="slider-block">
        <div class="slider-wrapper">
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
    </div>


</body>
</html>
