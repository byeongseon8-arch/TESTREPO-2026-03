<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- google ICON -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }
    </style>
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }
    </style>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        a {
            text-decoration: none;
            color: black;
        }

        /* layout */
        .layout-1280 {}

        .wrapper {}

        /* layout-header */
        .wrapper>header {
            border-bottom: 1px grey;
        }

        .wrapper>header>.top-header {}

        .wrapper>header>.top-header>ul {
            /* border: 1px solid; */
            display: flex;
            justify-content: right;
        }

        .wrapper>header>.top-header>ul>li {
            /* border: 1px solid; */
            padding: 5px 10px;
        }

        .wrapper>header>.top-header>ul>li>a {
            display: block;
            font-size: .8rem;
            color: grey;
        }

        .wrapper>header>.top-header>ul>li:last-child {
            padding-right: 0;
        }

        .wrapper>header>nav {}

        .wrapper>header>nav.nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wrapper>header>nav.nav-top>.left {}

        .wrapper>header>nav.nav-top>.left>img {
            width: 120px;
        }

        .wrapper>header>nav.nav-top>.right {
            display: flex;
            border: 1px solid;
            justify-content: space-between;
            /* width: 380px; */
            height: 40px;
            gap: 10px;
        }

        .wrapper>header>nav.nav-top>.right>nav-menu {}

        .wrapper>header>nav.nav-top>.right>nav-menu>ul {
            display: flex;
            align-items: center;
            /* border: 1px solid; */
            height: 100%;
        }

        .wrapper>header>nav.nav-top>.right>nav-menu>ul>li {
            padding: 5px 10px;
            position: relative;
        }

        .wrapper>header>nav.nav-top>.right>nav-menu>ul>li:nth-child(2)::after {
            content: '';
            display: block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: tomato;
            position: absolute;
            top: 0;
            right: 0;


        }

        .wrapper>header>nav.nav-top>.right>nav-menu>ul>li>a {
            display: block;
        }



        .wrapper>header>nav.nav-top>.right>nav-icon {
            width: 100%;
        }

        .wrapper>header>nav.nav-top>.right>nav-icon>ul {
            display: flex;
            justify-content: right;
            align-items: center;
            height: 100%;
            /* border: 1px solid; */
        }

        .wrapper>header>nav.nav-top>.right>nav-icon>ul>li {
            padding : 10px;
        }

        .wrapper>header>nav.nav-top>.right>nav-icon>ul>li:last-child{
            display: block;
        }
         .wrapper>header>nav.nav-top>.right>nav-icon>ul>li>a>span{
            font-size: 1.7rem;
         }

        .wrapper>header>nav.nav-bottom {
            border: 1px solid;
        }
        .wrapper>header>nav.nav-bottom>ul {
            /* border: 1px solid; */
            display: flex;
            justify-content: left;
            align-items: center;
            height: 100%;
        }
        .wrapper>header>nav.nav-bottom>ul>li{
            /* border: 1px solid; */
            padding: 5px 15px;
            height: 100px;
        }

         .wrapper>header>nav.nav-bottom>ul>li:first-child{
            padding-left: 0;
         }

        .wrapper>header>nav.nav-bottom>ul>li>a {
            display: block;
            height: 100%;
        }

        .wrapper>header>nav.nav-bottom>ul>li>li:hover{
            border-bottom: 2px solid;
        }

        /* layout-main */
        .wrapper>main {
            min-height: 250px;
            border: 1px solid;
        }

        .wrapper>main>section {
            min-height: 250px;
            border : 1px solid;
            padding: 40px 0;
        }

        .wrapppper>main>section.banner{
            margin-top:30px;
            height:480px;
            border-radius: 20px;
            background-color: gray;
        }
        
        /* layout footer */
        .wrapper>footer {}
    </style>
</head>

<body>

                    <div class="right gnb">
                        <div class="nav-menu"></div>
                        <ul>
                            <li><a href="javascript:void(0)">menu</a>
                            <li>
                            <li><a href="javascript:void(0)">menu</a></li>
                            <li><a href="javascript:void(0)">menu</a></li>
                        </ul>

                        <ul>
                            <li><a href="javascript:void(0)">ICON</a>

                    </div>
                </div>
                <div class="nav-bottom"></div>
                    <ul>
                        <li><a href="javascript:void(0)">산산기어</a></li>
                        <li><a href="javascript:void(0)">추천</a></li>
                        <li><a href="javascript:void(0)">봄맞이</a></li>
                        <li><a href="javascript:void(0)">신상</a></li>
                        <li><a href="javascript:void(0)">뷰티</a></li>
                        <li><a href="javascript:void(0)">럭셔리</a></li>
                        <li><a href="javascript:void(0)">랭킹</a></li>
                        <li><a href="javascript:void(0)">중고</a></li>
                        <li><a href="javascript:void(0)">이벤트</a></li>
                    </ul>
            </nav>
        </header>
        <main class="layout-1280">
            <section></section>
        </main>
        <footer></footer>
    </div>

</body>

</html>
