<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            width: 200px;
            height: 200px;
            background-color: orange;
            border: 1px solid;
        }

        .d1{
            border-top: 2px solid red;
            border-right: 3px dashed black;
            border-bottom: 4px dotted blue;
            border-left: 5px double green;
        }

        /* 삼각형 만들기 */
        .d2{
            border-top: 10px solid red;
            border-right: 10px dashed black;
            border-bottom: 10px dotted blue;
            border-left: 10px double green;
            width: 0px;
            height: 0px;
        }
        /* 테두리 깎기 */
        .d3{
            /* border-radius: 50px; */
            /* 1, 3 모서리 : 20px, 2,4번 모서리 40px */
            /* border-radius: 20px 40px; */

            /* 1 모서리 : 10px , 2,4번 모서리: 20px, 3모서리: 30px  */
            border-radius: 10px 20px 30px;

            /* 1 모서리 : 10px , 2모서리 20px, 3모서리: 30px, 4모서리 40px */
            /* border-radius: 10px 20px 30px 40px; */

            border-radius: 50% ;
        }

    </style>

</head>

<body>

    <div class="d1"></div>
    <hr/>
    <div class="d2"></div>
    <hr/>
    <div class="d3"></div>


</body>

</html>
