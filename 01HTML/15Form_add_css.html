<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        body{
            margin: 0;
            padding: 0;                       
        }
        input{
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            /* border-radius: 5px; */
            border: 1px solid;
            outline:none;
        }
        select{
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            /* border-radius: 5px; */
            border: 1px solid;
            outline:none;
        }

        .btn{
            color: white;
            border: 0;
            min-height: 40px;
            cursor: pointer;
        }

        .btn-sumit{
            width: 100%;
            background-color: royalblue;
        }
        

        .wrapper{
            max-width: 380px;
            width: 100%;
            border: 1px solid;
            margin: 0 auto;
            padding : 20px;
        }
        .wrapper>h2{}

        .wrapper>form{
            width:100%;
            /* border: 1px solid; */
        }
        .wrapper>form>.items{
            width:100%;
            border: 1px solid;
            margin-bottom: 10px;
        }
        .wrapper>form>.items>.item{}

        .wrapper>form>.items>.item.label{
            display:flex;
            justify-content: space-between;
        }
        .wrapper>form>.items>.item.phone{
            display:flex;
            justify-content: space-between;
            gap: 5px;
        }

        .wrapper>form>.items>.item.phone>select{
            width: 168px;

        }


        .wrapper>form>.items>.item.brith{
            display:flex;
            justify-content: space-between;
            gap: 5px;
        }    
            
    </style>

</head>
<body>
    
    <div class="wrapper">

        <h2>회원가입</h2>
        <form action="">
            <div class="items">
                <div class="items label">
                    <label>기본정보</label>
                    <span>필수 사항</span>
                </div>
                <div class="items">
                    <input type="text" placeholder="이메일"/>
                </div class="items">
                  <div>
                    <input type="password" placeholder="비밀번호"/>
                </div>
                <div class="items">
                    <input type="password" placeholder="비밀번호 확인"/>
                </div>
            </div class="items">
            <div class="items label label">
                <div>
                    <label>닉네임</label>
                    <span>선택 사항</span>
                </div>
                <div class="items">
                    <input type="text" placeholder="닉네임"/>
                </div>
                <div class="items">
                    <input type="file" />
                </div>
            </div>
            <div class="items" >
                <div class="items phone">
                    <label>전화번호</label>
                    <span>선택 사항</span>
                </div>
                <div class="items">
                    <select>
                        <option value="">010</option>
                        <option value="">011</option>
                    <input placeholder="휴대폰 번호를 입력해주세요" />
                </div>
            </div>
            <div class="items">
                <div class="items label">
                <label>생일</label>
                <span>선택 사항</span>
                </div>
                <div class="items brith"
                    <select>
                        <option value="">1998</option>
                        <option value="">1999</option>
                    </select>
                    <select>
                        <option value="">1월</option>
                        <option value="">2월</option>
                    </select>
                    <select>
                        <option value="">1일</option>
                        <option value="">2일</option>
                    </select>
                </div>
            </div>
            <div class="items>
                <button class="btn btn-sumit">회원가입</button>
            </div>
        </form>

    </div>

</body>
</html>
