<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin : 0;
            padding : 0;
        }
        .bg-video{
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
        }
        .bg-video>video{
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        "gradient-overlay"{
            position:fixed;
            left:0;
            top: 0;
            width: 100vw;
            height:20%
            background: linear-gradient(to bottom, rgba(0,0,0,0,8)),rgba 
        }

    </style>
</head>

<body>
    <!-- 
        1) video option
            controls : 하단 제어부 표시 여부
            autoplay : 자동재생
            muted : 음소거
            loop : 반복 재생
        2) MIME TYPE
        Client - Sever 간 자료 (보통 파일)을 교환할 때
        사용되는 표준화된 식별자
        type/suybtype
        type : text , image , video , application
        subtype : html , png , mp4 , pdf ..
    -->
        <div class="wrapper">

            <div class="gradient-overlay"></div>

    
            <div class="bg-video">
                 <video autoplay muted loop>
                    <source src="./video/test.mp4" type="video/mp4" />
        </video>

</body>
</html>
