<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        
    </style>

</head>

<body>

    <div class="wrapper">
        <div>
            <h1>정보 입력</h1>
        </div>
        <form action="" method="get">
            <div>
                <h2>회원 정보 입력</h2>
            </div>
            <div>
                <label>이름</label>
                <input name="name" type="text">
            </div>
            <div>
                <small>* 한글은 10자, 영문은 20자 이내로 입력해 주세요</small>
            </div>
            <div>
                <label>아이디</label>
                <input type="userid" type="text">
                <a href="javascript:void(0)">중복확인</a>
            </div>
            <div>
                 <small>* 6자리 이상의 영문 혹은 영문, 숫자를 조합하여 입력해 주세요</small>
            </div>
            <div>
                <label>비밀번호</label>
                <input type="password" type="password">
            </div>
            <div>
                <small>* 영문, 대소문자, 숫자, 특수문자 중 3개 이상을 조합하여 8자리 이상 입력해 주세요 </small>
            <div>
                <label>비밀번호 확인</label>
                <input type="password" type="password">
            </div>
            <div>
                <label>이메일</label>
                <input type="text" type="text">@<input type="text" type="text"> 
                <select>
                    <option value="email">직접입력</option>
                    <option value="email">naver.com</option>
                    <option value="email">daum.com</option>
                    <option value="email">gmail.com</option>
                    <option value="email">nate.com</option>
                </select>
                <a href="javascript:void(0)">중복확인</a>
            </div>
            <div>
                 <small>* 맞춤상품 추천 및 Hpoint 서비스 이용을 위해 생년월일과 성별을 정확히 입력해 주세요.</small>
            </div>
            <div>
                <label>생년월일</label>
                <input type="text" type="birth" placeholder="예:20260309"
            </div>
            <div>
                <label>남자</label><input type="checkbox"> <label>여자</label><input type="checkbox">
            </div>
            <div>
                <label>휴대폰 번호</label>
                <select>
                <option value="number">선택</option>
                <option value="number">010</option>
                <option value="number">011</option>
                <option value="number">014</option>
                <option value="number">013</option>
            </div>
            <div>
                <input type="number">-<input type="number">
                <a href="javascript:void(0)">인증번호 전송</a>
            </div>
        
        </form>
    </div>
</body>

</html>
